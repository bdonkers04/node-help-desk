services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: Y
      MSSQL_SA_PASSWORD: ${DB_PASSWORD:-YourStrong!Passw0rd}
    ports: ["1433:1433"]
    volumes: [sql_data:/var/opt/mssql]
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '$${MSSQL_SA_PASSWORD}' -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
  db-init:
    image: mcr.microsoft.com/mssql-tools
    depends_on: { db: { condition: service_healthy } }
    volumes: ["./database:/scripts"]
    entrypoint: ["/bin/bash","-c","/opt/mssql-tools/bin/sqlcmd -S db -U sa -P '$${DB_PASSWORD}' -i /scripts/init.sql && /opt/mssql-tools/bin/sqlcmd -S db -U sa -P '$${DB_PASSWORD}' -i /scripts/seed.sql"]
    environment: { DB_PASSWORD: "${DB_PASSWORD:-YourStrong!Passw0rd}" }
  app:
    build: .
    depends_on: { db-init: { condition: service_completed_successfully } }
    environment:
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      DB_SERVER: db
      DB_NAME: HelpDesk
      DB_USER: sa
      DB_PASSWORD: ${DB_PASSWORD:-YourStrong!Passw0rd}
      DB_TRUST_CERT: "true"
    ports: ["3000:3000"]
    volumes: [uploads:/app/uploads]
volumes: { sql_data: {}, uploads: {} }
